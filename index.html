<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universe Generator Project</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        overflow: hidden;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      .panel {
        position: fixed;
        top: 16px;
        left: 16px;
        width: min(360px, calc(100vw - 32px));
        padding: 16px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(14px);
      }

      .panel h1 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .panel p {
        margin: 0 0 12px;
        color: #94a3b8;
        font-size: 13px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      button,
      select {
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 10px;
        background: rgba(30, 41, 59, 0.92);
        color: #e2e8f0;
        cursor: pointer;
        font: inherit;
        padding: 8px 10px;
      }

      button:hover,
      select:hover {
        border-color: #60a5fa;
      }

      .stats {
        display: grid;
        gap: 5px;
        color: #cbd5e1;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <section class="panel" aria-label="Contrôles de simulation">
      <h1 id="system-name">Universe Generator</h1>
      <p>Simulation orbitale Kepler + rendu Three.js vanilla.</p>
      <div class="row">
        <button id="regenerate">Regénérer</button>
        <button id="pause-toggle">Pause</button>
        <button data-speed="1">x1</button>
        <button data-speed="10">x10</button>
        <button data-speed="100">x100</button>
      </div>
      <div class="row">
        <select id="focus-select" aria-label="Focus caméra"></select>
        <button id="focus-origin">Focus étoile</button>
      </div>
      <div class="stats" id="stats"></div>
    </section>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
